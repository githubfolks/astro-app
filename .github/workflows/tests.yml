name: Tests

on:
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Runs the auth/wallet/payment/consultation suites plus the OpenAPI
      # contract drift check (test_openapi_contract.py), which fails the build if
      # the API surface changes without updating api/openapi.json.
      - name: Run tests
        run: python -m pytest -q

  web-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit/integration tests
        run: npm test

  web-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Playwright's webServer config boots the Vite dev server itself; the
      # backend is mocked at the network layer, so no API/DB is needed.
      - name: Run e2e tests
        run: npx playwright test
