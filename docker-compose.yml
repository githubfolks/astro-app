# Base stack — services shared by every environment.
#
# Do NOT run this file on its own. Always combine it with one environment overlay,
# which decides where the database lives and what API URL the frontends are built with:
#
#   Local (macOS, native Postgres on the host):
#     docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
#
#   VPS (standalone dockerized Postgres — see api/scripts/docker-compose.yml):
#     docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d --build
#
# The DB connection (SQLALCHEMY_DATABASE_URL) and other secrets come from .env.
services:
  api:
    build: ./api
    container_name: astro_api
    env_file:
      - .env
    environment:
      SQLALCHEMY_DATABASE_URL: "${SQLALCHEMY_DATABASE_URL}"
      REDIS_URL: "${REDIS_URL}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
    ports:
      - "9000:8000"
    volumes:
      - ./api/uploads:/app/uploads
    depends_on:
      - redis
    # Lets the api container reach Postgres running on the Docker host
    # (native Postgres locally, the standalone Postgres container on the VPS).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  web:
    build:
      context: ./web
    container_name: astro_web
    ports:
      - "4002:80"
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  admin:
    build:
      context: ./admin
    container_name: astro_admin
    ports:
      - "4001:80"
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  redis:
    image: "redis:alpine"
    container_name: astro_redis
    ports:
      - "6389:6379"
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  mirotalk:
    image: mirotalk/sfu:latest
    container_name: astro_mirotalk
    ports:
      - "4020:3010"
    environment:
      - PORT=3010
      - TRUST_PROXY=true
      - API_KEY_SECRET=${MIROTALK_API_KEY_SECRET}
      - JWT_SECRET=${MIROTALK_JWT_SECRET}
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1G

networks:
  default:
    name: astro-app-network
