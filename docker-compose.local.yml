# Local development overlay (macOS).
#
# Database: PostgreSQL installed natively on the Mac host (e.g. Homebrew), NOT in Docker.
# The api container reaches it through host.docker.internal:5432 (see base extra_hosts).
# Set the matching SQLALCHEMY_DATABASE_URL in .env, e.g.:
#   SQLALCHEMY_DATABASE_URL=postgresql://postgres:<pw>@host.docker.internal:5432/app_db?options=-csearch_path%3Daadikarta_db
#
# This overlay intentionally defines NO db service and NO global-proxy-network,
# so the stack comes up on a laptop with nothing but Docker + a local Postgres.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
services:
  api:
    environment:
      APP_ENV: development

  web:
    build:
      args:
        VITE_API_URL: "http://localhost:9000"

  admin:
    build:
      args:
        VITE_API_URL: "http://localhost:9000"
