# ==========================================================
# 3. STAGING API - api.aadikarta.org (Full API)
# ==========================================================
server {
    server_name api.aadikarta.org;

    location / {
        proxy_pass http://localhost:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Long timeouts for AI analysis
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /chat/ws {
        proxy_pass http://localhost:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    listen 443 ssl; 
    ssl_certificate /etc/letsencrypt/live/aadikarta.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/aadikarta.org/privkey.pem; # managed by Certbot
}

# ==========================================================
# 4. STAGING ADMIN - admin.aadikarta.org (Admin Panel)
# ==========================================================
server {
    server_name admin.aadikarta.org;

    location / {
        proxy_pass http://localhost:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/aadikarta.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/aadikarta.org/privkey.pem; # managed by Certbot
}

# ==========================================================
# HTTP to HTTPS Redirects
# ==========================================================
server {
    listen 80;
    server_name aadikarta.org www.aadikarta.org dev.aadikarta.org api.aadikarta.org admin.aadikarta.org;
    return 301 https://$host$request_uri;
}
