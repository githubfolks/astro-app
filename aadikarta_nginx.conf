# ==========================================================
# HTTP to HTTPS Redirects
# ==========================================================
server {
    server_tokens off;
    listen 80;
    server_name aadikarta.org api.aadikarta.org admin.aadikarta.org;
    return 301 https://$host$request_uri;
}

server {
    server_tokens off;
    listen 80;
    server_name www.aadikarta.org;
    return 301 https://aadikarta.org$request_uri;
}
