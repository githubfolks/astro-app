<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />

  <!-- Primary SEO — fallback shown before JS runs (Googlebot sees this) -->
  <title>Aadikarta — Talk to Expert Astrologers Online | Vedic Astrology, Tarot & More</title>
  <meta name="description" content="Connect with India's top verified astrologers on Aadikarta. Get live chat consultations on Vedic astrology, kundli matching, tarot reading, love advice, and daily horoscope. Starting from ₹10/min." />
  <link rel="canonical" href="https://aadikarta.org/" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Aadikarta" />
  <meta property="og:url" content="https://aadikarta.org/" />
  <meta property="og:title" content="Aadikarta — Talk to Expert Astrologers Online" />
  <meta property="og:description" content="Connect with India's top verified astrologers. Live chat consultations on Vedic astrology, tarot, kundli matching & more. Starting from ₹10/min." />
  <meta property="og:image" content="https://aadikarta.org/assets/og-image.jpg" />
  <meta property="og:image:alt" content="Aadikarta — Talk to Expert Astrologers Online" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@aadikarta" />
  <meta name="twitter:title" content="Aadikarta — Talk to Expert Astrologers Online" />
  <meta name="twitter:description" content="India's top verified astrologers. Live consultations starting from ₹10/min." />
  <meta name="twitter:image" content="https://aadikarta.org/assets/og-image.jpg" />
  <meta name="twitter:image:alt" content="Aadikarta — Talk to Expert Astrologers Online" />

  <!-- Structured Data: Organisation + WebSite (static, always present) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://aadikarta.org/#organization",
        "name": "Aadikarta",
        "url": "https://aadikarta.org",
        "logo": "https://aadikarta.org/assets/logo.png",
        "description": "India's online astrology marketplace connecting seekers with verified Vedic astrologers, tarot readers, and numerologists.",
        "knowsAbout": ["Vedic Astrology", "Jyotish", "Tarot Reading", "Kundli Matching", "Numerology", "Vastu Shastra", "Daily Horoscope", "Spiritual Guidance"],
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "hello@aadikarta.org",
          "contactType": "customer support"
        },
        "sameAs": [
          "https://www.facebook.com/aadikarta",
          "https://www.instagram.com/aadikarta"
        ]
      },
      {
        "@type": "WebSite",
        "@id": "https://aadikarta.org/#website",
        "url": "https://aadikarta.org",
        "name": "Aadikarta",
        "publisher": { "@id": "https://aadikarta.org/#organization" },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://aadikarta.org/astrologers?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    ]
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="preload" href="/assets/logo.png" as="image">
</head>

<body>
  <div id="app"></div>
  <script defer src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
