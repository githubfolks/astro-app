<!doctype html>
<html lang="en-IN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.ico" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />

  <!-- Primary SEO — fallback shown before JS runs (Googlebot sees this) -->
  <title>Aadikarta — Talk to Expert Astrologers Online</title>
  <meta name="description"
    content="Connect with top verified astrologers on Aadikarta. Get live chat consultations on Vedic astrology, kundli matching, and daily horoscope from ₹10/min." />
  <link rel="canonical" href="https://aadikarta.org/" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Aadikarta" />
  <meta property="og:url" content="https://aadikarta.org/" />
  <meta property="og:title" content="Aadikarta — Talk to Expert Astrologers Online" />
  <meta property="og:description"
    content="Connect with India's top verified astrologers. Live chat consultations on Vedic astrology, tarot, kundli matching & more. Starting from ₹10/min." />
  <meta property="og:image" content="https://aadikarta.org/assets/og-image.jpg" />
  <meta property="og:image:alt" content="Aadikarta — Talk to Expert Astrologers Online" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@aadikarta" />
  <meta name="twitter:title" content="Aadikarta — Talk to Expert Astrologers Online" />
  <meta name="twitter:description"
    content="India's top verified astrologers. Live consultations starting from ₹10/min." />
  <meta name="twitter:image" content="https://aadikarta.org/assets/og-image.jpg" />
  <meta name="twitter:image:alt" content="Aadikarta — Talk to Expert Astrologers Online" />

  <!-- Structured data is injected per-page by react-helmet-async (see Home.tsx etc.) -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" as="style">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="preload" href="/assets/logo.png" as="image">
  <link rel="preload" href="/assets/hero_astrology.png" as="image" fetchpriority="high">
</head>

<body>
  <div id="app"></div>
  
  <!-- Static fallback links for SEO crawlers that don't wait for React -->
  <nav style="display:none;" aria-label="Quick Links">
    <a href="/">Home</a>
    <a href="/about-us">About Us</a>
    <a href="/blog">Blog</a>
    <a href="/chat-with-astrologers">Chat with Astrologers</a>
    <a href="/join-as-astrologer">Join as Astrologer</a>
    <a href="/privacy-policy">Privacy Policy</a>
    <a href="/terms-of-service">Terms of Service</a>
  </nav>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Aadikarta",
    "url": "https://aadikarta.org",
    "logo": "https://aadikarta.org/assets/logo.png",
    "description": "We bridge ancient Vedic wisdom with modern life, providing authentic astrological guidance."
  }
  </script>

  <script defer src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
